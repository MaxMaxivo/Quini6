name: Actualizar datos Quini 6

on:
  workflow_dispatch:
  schedule:
    - cron: '17 10 * * 1,4'

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Probar script mínimo
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone

          data = {
              "actualizado_en_utc": datetime.now(timezone.utc).isoformat(),
              "sorteos": []
          }

          with open("datos.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          print("datos.json actualizado correctamente")
          PY

      - name: Commit y push si hubo cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add datos.json
          git diff --cached --quiet || git commit -m "Actualizar datos.json"
          git push
