<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Quini 6 - Control</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Control Quini 6</h1>

<div class="config">
  <label>Mes desde</label>
  <select id="mesDesde"></select>

  <label>Mes hasta</label>
  <select id="mesHasta"></select>

  <label>Año</label>
  <select id="anio"></select>

  <label>Jugada fija</label>
  <input id="jugada" value="01-08-17-21-31-33">

  <label>Valor base ($)</label>
  <input id="valorBase" type="number" value="0">

  <button onclick="generar()">Generar reporte</button>
</div>

<hr>

<div id="resumen"></div>

<table id="tabla">
  <thead>
    <tr>
      <th>Fecha</th>
      <th>Día</th>
      <th>Valor</th>
      <th>Valor efectivo</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<h2 id="totalFinal"></h2>

<script src="app.js"></script>
</body>
</html>
